<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&display=swap" rel="stylesheet">

<style>

  /* light mode colors */
  body {
    --primary-color: #5871a2;
    --primary-pale-color: #5871a233;
    --primary-decoration-color: #5871a210;
    --bg-color: #e2c3a4;
    --text-color: #000000;
    --text-pale-color: #767676;
    --text-decoration-color: #a9a9a9;
    --highlight-mark-color: #5f75b020;

    --callout-note-color: #5871a2;
    --callout-tip-color: #268556;
    --callout-important-color: #885fc9;
    --callout-warning-color: #ab6632;
    --callout-caution-color: #c64e4e;
  }

  /* dark mode colors */
  body.dark {
    --primary-color: #6f8fd1;
    --primary-pale-color: #6f8fd166;
    --primary-decoration-color: #6f8fd112;
    --bg-color: #000000;

    --text-color: #c1c1c1;
    --text-pale-color: #848484;
    --text-decoration-color: #5f5f5f;
    --highlight-mark-color: #8296cb3b;

    --callout-note-color: #6f8fd1;
    --callout-tip-color: #47976f;
    --callout-important-color: #9776cd;
    --callout-warning-color: #ad7a52;
    --callout-caution-color: #d06161;
  }

  /* typography */
  body {
    --main-font: ui-sans-serif, system-ui, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';
    --code-font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
    --homepage-max-width: 768px;
    --main-max-width: 768px;
    --avatar-size: 75px;
    --font-size: 16px;
    --line-height: 1.75;
    --img-border-radius: 7px;
    --detail-border-radius: 0px;
    --dark-mode-img-brightness: 0.75;
    --dark-mode-chart-brightness: 0.75;
    --inline-code-border-radius: 2px;
    --inline-code-bg-color: var(--primary-decoration-color);
    --block-code-border-radius: 0px;
    --block-code-border-color: var(--primary-color);
    --detail-border-color: var(--primary-color);
  }

#name {
  font-size: 33px;
  font-family: 'Fira Code', monospace;
  font-weight: 700;
  display: inline-flex;
}

#name span {
  display: inline-block;
  animation: wave 1.6s ease-in-out infinite;
}

@keyframes wave {
  0%, 100% { transform: translateY(0); }
  40%       { transform: translateY(-8px); }
  60%       { transform: translateY(-4px); }
}

#links a.title,
#links .left a:first-child {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-decoration: none;
    color: var(--text-color);
  }

#left a {
    text-decoration: none;
    font-family: 'Fira Code', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--primary-color);
    padding: 5px 10px;
    border-radius: 6px;
    transition: background 0.15s;
}

#links a:hover {
    background: var(--primary-decoration-color);
    text-decoration: none;
}
</style>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const el = document.getElementById("name");
    const text = el.textContent;
    el.textContent = "";
    text.split("").forEach((ch, i) => {
      const s = document.createElement("span");
      s.textContent = ch === " " ? "\u00a0" : ch;
      s.style.animationDelay = (i * 0.08) + "s";
      el.appendChild(s);
    });
  });
</script>
